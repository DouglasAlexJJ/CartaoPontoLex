<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edição - CartaoPontoLex</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script type="module" src="js/seguranca.js"></script>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/app.css">
</head>
<body>
    <header class="app-header">
    <div class="header-actions-left">
        <button onclick="voltarEsalvar()" class="btn-secundario">
            <span style="font-size: 1.2em; line-height: 1;">‹</span> Painel
        </button>
    </div>
    
    <div class="app-info">
        <strong id="info-reclamante">Carregando...</strong>
        <small>Mesa de Trabalho</small>
    </div>
    
    <div class="header-actions-right" style="position: relative;">
        <button onclick="toggleMenuConfig(event)" class="btn-primario" style="background: #334155; border-color: #1e293b;">
            ⚙️ Configurações
        </button>
        
        <div id="menu-config-app" class="dropdown-content escondido">
            <button onclick="alert('Exportação em PDF em breve!')">📄 Exportar PDF</button>
            <div class="divisor"></div>
            
            <button onclick="abrirModalAfastamento()">🏥 Lançar Afastamentos</button>
            
            <div class="divisor"></div>
            <div class="menu-section">Estrutura</div>
            <button onclick="abrirModalAjusteDatas()">📅 Excluir/Incluir Datas</button>
        </div>
    </div>
</header>

    <main class="app-container">
        <table id="tabela-ponto">
            <thead>
    <tr>
        <th style="width: 140px;">Data</th>
        <th>
            Horários de Entrada e Saída
            <span style="display: inline-block; margin-left: 15px; font-size: 0.75em; font-weight: normal; color: #94a3b8; text-transform: none; background: rgba(255,255,255,0.1); padding: 2px 8px; border-radius: 4px;">
                💡 Atalho: <strong>+</strong> ou <strong>-</strong>
            </span>
        </th>
        <th style="width: 90px;">Total</th>
    </tr>
</thead>
            <tbody id="corpo-tabela"></tbody>
        </table>
    </main>

    <footer id="rodape-totalizador">
    <div class="resumo-painel">
        <div class="resumo-item">
            <span>Total Geral Trabalhado</span>
            <strong id="total-geral-periodo">00:00</strong>
        </div>
        <div class="resumo-item">
            <span>Horas Normais</span>
            <strong id="total-normais" style="color: #f1f5f9;">00:00</strong>
        </div>
        <div class="resumo-item">
            <span>Extras (50%)</span>
            <strong id="total-ext50" style="color: #fbbf24;">00:00</strong>
        </div>
        <div class="resumo-item">
            <span>Extras (100%)</span>
            <strong id="total-ext100" style="color: #f87171;">00:00</strong>
        </div>
        <div class="resumo-item">
            <span>Adic. Noturno Fictício</span>
            <strong id="total-noturno" style="color: #60a5fa;">00:00</strong>
        </div>
    </div>
</footer>
    <script type="module" src="js/app.js"></script>
    <div id="modal-afastamento" class="modal-overlay escondido">
        <div class="modal-card" style="max-width: 450px;">
            <div class="modal-header">
                <h3>🏥 Lançar Afastamento</h3>
                <button class="btn-fechar" onclick="fecharModalAfastamento()">×</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>Motivo</label>
                    <select id="afastamento-motivo" class="input-premium">
                        <option value="Férias">🏖️ Férias</option>
                        <option value="Atestado Médico">🩺 Atestado Médico</option>
                        <option value="Licença">📜 Licença</option>
                        <option value="Acidente de Trabalho">🚑 Acidente de Trabalho</option>
                        <option value="Falta Injustificada">❌ Falta Injustificada</option>
                    </select>
                </div>
                <div style="display: flex; gap: 15px; margin-top: 15px;">
                    <div class="form-group" style="flex: 1;"><label>Início</label><input type="date" id="afastamento-inicio" class="input-premium"></div>
                    <div class="form-group" style="flex: 1;"><label>Fim</label><input type="date" id="afastamento-fim" class="input-premium"></div>
                </div>
            </div>
            <div class="modal-footer">
                <button onclick="aplicarAfastamento()" class="btn-primario" style="width: 100%;">Aplicar</button>
            </div>
        </div>
    </div>

    <div id="modal-ajuste-datas" class="modal-overlay escondido">
        <div class="modal-card" style="max-width: 400px;">
            <div class="modal-header">
                <h3>📅 Período do Cartão</h3>
                <button class="btn-fechar" onclick="fecharModalAjusteDatas()">×</button>
            </div>
            <div class="modal-body">
                <div class="form-group"><label>Nova Data Inicial</label><input type="date" id="ajuste-data-inicio" class="input-premium"></div>
                <div class="form-group"><label>Nova Data Final</label><input type="date" id="ajuste-data-fim" class="input-premium"></div>
            </div>
            <div class="modal-footer">
                <button onclick="aplicarAjusteDatas()" class="btn-primario" style="width: 100%; background: #1e293b;">Salvar</button>
            </div>
        </div>
    </div>
</body>
</html>
