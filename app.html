<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edição - CartaoPontoLex</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script type="module" src="js/seguranca.js"></script>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/app.css">
</head>
<body>
    <header class="app-header">
        <button class="btn-secundario" onclick="voltarEsalvar()">
    <span style="font-size: 1.2em; line-height: 1;">‹</span> Voltar para o Painel
</button>
        <div class="app-info">
            <strong><span id="info-reclamante">Carregando...</span></strong>
            <small>Período: <span id="info-periodo">...</span></small>
        </div>
        <button class="btn-primario">📥 Exportar</button>
    </header>

    <main class="app-container">
        <table id="tabela-ponto">
            <thead>
                <tr>
                    <th style="width: 140px;">Data</th>
                    <th>Horários de Entrada e Saída</th>
                    <th style="width: 90px;">Total</th>
                </tr>
            </thead>
            <tbody id="corpo-tabela"></tbody>
        </table>
    </main>

    <footer id="rodape-totalizador">
        <div class="total-card">
            <span>Total no Período:</span>
            <strong id="total-geral-periodo">00:00</strong>
        </div>
    </footer>
    <script type="module" src="js/app.js"></script>
</body>
</html>
